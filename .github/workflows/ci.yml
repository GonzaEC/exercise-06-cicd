name: CI/CD

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    if: github.repository_owner != 'unlu-sd2026'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Mandatory secret-scanning gate: fails the pipeline on any leak.
      - name: Gitleaks scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo --no-banner --redact --verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build image and start stack
        run: |
          cp .env.example .env
          docker compose build
          docker compose up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs
          exit 1

      - name: Run tests
        run: |
          pip install pytest requests pyyaml
          pytest tests/ -v --tb=short

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (SHA + latest)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          docker tag noderegistry-api:ci "$IMAGE:${{ github.sha }}"
          docker tag noderegistry-api:ci "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
